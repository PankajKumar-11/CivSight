<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#18181B" rx="12" />
  
  <!-- Browser Chrome -->
  <rect width="800" height="40" fill="#09090B" rx="12" />
  <circle cx="20" cy="20" r="6" fill="#EF4444" />
  <circle cx="40" cy="20" r="6" fill="#F59E0B" />
  <circle cx="60" cy="20" r="6" fill="#10B981" />
  <rect x="120" y="8" width="560" height="24" rx="6" fill="#27272A" />
  <text x="400" y="24" fill="#A1A1AA" font-family="monospace" font-size="11" text-anchor="middle">https://civsight-app.run.app/field-ops-routing</text>
  
  <!-- Content Panels -->
  <!-- Left Workspace: TSP Route Sequence checklist -->
  <rect x="15" y="55" width="260" height="380" fill="#09090B" rx="8" stroke="#27272A" stroke-width="1.5" />
  <text x="30" y="85" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">🚚 Field Crew Routing</text>
  <text x="30" y="105" fill="#10B981" font-family="system-ui, sans-serif" font-size="11" font-weight="600">ROUTE SOLVER: ACTIVE (TSP)</text>
  
  <!-- Route Sequence list -->
  <g font-family="system-ui, sans-serif" font-size="12">
    <!-- Base Node -->
    <rect x="25" y="130" width="240" height="46" rx="6" fill="#18181B" stroke="#10B981" stroke-width="1" />
    <circle cx="42" cy="153" r="10" fill="#10B981" />
    <text x="42" y="157" fill="#09090B" font-size="10" font-weight="bold" text-anchor="middle">1</text>
    <text x="62" y="148" fill="#FFFFFF" font-weight="bold">Base Station (Start)</text>
    <text x="62" y="162" fill="#71717A">Ward 7 Operations Depot</text>
    
    <!-- Pothole Node -->
    <rect x="25" y="185" width="240" height="46" rx="6" fill="#18181B" stroke="#27272A" />
    <circle cx="42" cy="208" r="10" fill="#3B82F6" />
    <text x="42" y="212" fill="#FFFFFF" font-size="10" font-weight="bold" text-anchor="middle">2</text>
    <text x="62" y="203" fill="#FFFFFF" font-weight="600">Pothole Repair #8788</text>
    <text x="62" y="217" fill="#F97316">SLA High • 0.45 km away</text>
    
    <!-- Streetlight Node -->
    <rect x="25" y="240" width="240" height="46" rx="6" fill="#18181B" stroke="#27272A" />
    <circle cx="42" cy="263" r="10" fill="#3B82F6" />
    <text x="42" y="267" fill="#FFFFFF" font-size="10" font-weight="bold" text-anchor="middle">3</text>
    <text x="62" y="258" fill="#FFFFFF" font-weight="600">Streetlight Fix #8792</text>
    <text x="62" y="272" fill="#EAB308">SLA Med • 1.12 km away</text>
    
    <!-- Leak Node -->
    <rect x="25" y="295" width="240" height="46" rx="6" fill="#18181B" stroke="#27272A" />
    <circle cx="42" cy="318" r="10" fill="#3B82F6" />
    <text x="42" y="322" fill="#FFFFFF" font-size="10" font-weight="bold" text-anchor="middle">4</text>
    <text x="62" y="313" fill="#FFFFFF" font-weight="600">Water Leak Siphon #8801</text>
    <text x="62" y="327" fill="#3B82F6">SLA High • 2.04 km away</text>
    
    <!-- Return Node -->
    <rect x="25" y="350" width="240" height="46" rx="6" fill="#18181B" stroke="#27272A" />
    <circle cx="42" cy="373" r="10" fill="#10B981" />
    <text x="42" y="377" fill="#09090B" font-size="10" font-weight="bold" text-anchor="middle">5</text>
    <text x="62" y="368" fill="#FFFFFF" font-weight="bold">Base Station (Return)</text>
    <text x="62" y="382" fill="#71717A">Saves 1.8km using TSP</text>
  </g>
  
  <!-- Right Workspace: Route map visualization -->
  <rect x="290" y="55" width="495" height="380" fill="#111827" rx="8" stroke="#1F2937" stroke-width="1.5" />
  
  <!-- Map Roads -->
  <path d="M 330 150 L 730 150 M 330 280 L 730 280 M 500 55 L 500 435" stroke="#374151" stroke-width="14" stroke-linecap="round" opacity="0.6" />
  
  <!-- TSP Connected Route trajectory path (glowing green/cyan) -->
  <path d="M 450 110 L 410 170 L 610 150 L 530 330 L 450 110" fill="none" stroke="#10B981" stroke-width="4" stroke-dasharray="8,4" />
  <path d="M 450 110 L 410 170 L 610 150 L 530 330 L 450 110" fill="none" stroke="#10B981" stroke-width="12" opacity="0.15" />
  
  <!-- Arrow indicators on route -->
  <path d="M 432 136 L 428 142 L 436 142 Z" fill="#10B981" transform="rotate(-30, 432, 136)" />
  <path d="M 510 160 L 506 166 L 514 166 Z" fill="#10B981" transform="rotate(80, 510, 160)" />
  <path d="M 570 240 L 566 246 L 574 246 Z" fill="#10B981" transform="rotate(160, 570, 240)" />
  
  <!-- Node Markers on Map -->
  <!-- 1. Base (450, 110) -->
  <circle cx="450" cy="110" r="16" fill="#10B981" fill-opacity="0.3" />
  <circle cx="450" cy="110" r="10" fill="#10B981" />
  <text x="450" y="113" fill="#09090B" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">1</text>
  
  <!-- 2. Pothole (410, 170) -->
  <circle cx="410" cy="170" r="16" fill="#3B82F6" fill-opacity="0.3" />
  <circle cx="410" cy="170" r="10" fill="#3B82F6" />
  <text x="410" y="173" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">2</text>
  
  <!-- 3. Streetlight (610, 150) -->
  <circle cx="610" cy="150" r="16" fill="#3B82F6" fill-opacity="0.3" />
  <circle cx="610" cy="150" r="10" fill="#3B82F6" />
  <text x="610" y="153" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">3</text>
  
  <!-- 4. Water Leak (530, 330) -->
  <circle cx="530" cy="330" r="16" fill="#3B82F6" fill-opacity="0.3" />
  <circle cx="530" cy="330" r="10" fill="#3B82F6" />
  <text x="530" y="333" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">4</text>
  
  <!-- Node Information label tags -->
  <g font-family="system-ui, sans-serif" font-size="9" fill="#FAFAFA">
    <rect x="425" y="65" width="50" height="18" rx="4" fill="#09090B" opacity="0.8" />
    <text x="450" y="77" text-anchor="middle">Base Depot</text>
    
    <rect x="350" y="190" width="60" height="18" rx="4" fill="#09090B" opacity="0.8" />
    <text x="380" y="202" text-anchor="middle">Pothole (0.4k)</text>
    
    <rect x="615" y="120" width="70" height="18" rx="4" fill="#09090B" opacity="0.8" />
    <text x="650" y="132" text-anchor="middle">Streetlight (1.1k)</text>
  </g>
</svg>
