<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background (Blurred map background mockup) -->
  <rect width="800" height="450" fill="#111827" rx="12" />
  
  <!-- Map grids (faded behind drawer) -->
  <path d="M 0 100 L 800 100 M 0 200 L 800 200 M 0 300 L 800 300 M 0 400 L 800 400" stroke="#1F2937" stroke-width="1" opacity="0.3" />
  <path d="M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450" stroke="#1F2937" stroke-width="1" opacity="0.3" />
  <circle cx="150" cy="180" r="10" fill="#EF4444" opacity="0.4" />
  <circle cx="320" cy="280" r="12" fill="#F97316" opacity="0.4" />
  
  <!-- Overlay Backdrop to dim the map -->
  <rect width="800" height="450" fill="#000000" fill-opacity="0.5" rx="12" />
  
  <!-- Slide-Over Sidebar Drawer (Right side) -->
  <rect x="420" y="0" width="380" height="450" fill="#09090B" rx="12" stroke="#27272A" stroke-width="2" />
  
  <!-- Drawer Header -->
  <path d="M 440 25 L 455 25" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" />
  <path d="M 440 30 L 455 30" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" />
  <text x="475" y="32" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Incident #8788 Details</text>
  <rect x="705" y="15" width="80" height="22" rx="11" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="1" />
  <text x="745" y="29" fill="#EF4444" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">SLA TICKING</text>
  
  <line x1="420" y1="50" x2="800" y2="50" stroke="#27272A" stroke-width="1.5" />
  
  <!-- Section 1: SLA Countdown Box -->
  <rect x="440" y="65" width="340" height="75" rx="8" fill="#18181B" stroke="#27272A" stroke-width="1.5" />
  <text x="455" y="85" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SLA COUNTDOWN TO DISPATCH</text>
  <text x="455" y="122" fill="#F97316" font-family="monospace" font-size="28" font-weight="bold">23h 44m 12s</text>
  <text x="765" y="118" fill="#F97316" font-family="system-ui, sans-serif" font-size="22" text-anchor="end">🕒</text>
  
  <!-- Section 2: Metadata Fields -->
  <text x="440" y="165" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">INCIDENT METADATA</text>
  
  <g font-family="system-ui, sans-serif" font-size="11">
    <!-- Category -->
    <rect x="440" y="175" width="165" height="42" rx="6" fill="#18181B" stroke="#27272A" />
    <text x="450" y="191" fill="#71717A">Category</text>
    <text x="450" y="207" fill="#E4E4E7" font-weight="bold">Water Pipe Rupture</text>
    
    <!-- Priority -->
    <rect x="615" y="175" width="165" height="42" rx="6" fill="#18181B" stroke="#27272A" />
    <text x="625" y="191" fill="#71717A">SLA Priority Rating</text>
    <text x="625" y="207" fill="#EF4444" font-weight="bold">9.2 / 10 (Critical)</text>
    
    <!-- Geolocation -->
    <rect x="440" y="225" width="340" height="42" rx="6" fill="#18181B" stroke="#27272A" />
    <text x="450" y="241" fill="#71717A">Verified Location Address</text>
    <text x="450" y="257" fill="#E4E4E7" font-weight="bold">MI Road, Ward 7, Jaipur (26.915, 75.801)</text>
  </g>
  
  <!-- Section 3: Community Validation meter -->
  <text x="440" y="295" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">COMMUNITY VALIDATION</text>
  <rect x="440" y="305" width="340" height="10" rx="5" fill="#27272A" />
  <rect x="440" y="305" width="340" height="10" rx="5" fill="#10B981" /> <!-- 100% full -->
  <text x="440" y="330" fill="#10B981" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">✓ SLA Dispatched (5/5 Citizens Upvoted)</text>
  
  <!-- Section 4: Timeline Audit Trail -->
  <text x="440" y="360" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">CHRONOLOGICAL AUDIT HISTORY</text>
  
  <!-- Timeline vertical line -->
  <line x1="450" y1="375" x2="450" y2="435" stroke="#27272A" stroke-width="2" />
  
  <!-- Timeline Node 1 -->
  <circle cx="450" cy="380" r="4" fill="#10B981" />
  <text x="465" y="384" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Incident Reported</text>
  <text x="780" y="384" fill="#71717A" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">10:30 AM</text>
  
  <!-- Timeline Node 2 -->
  <circle cx="450" cy="405" r="4" fill="#3B82F6" />
  <text x="465" y="409" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">AI Triage Classifier Dispatched Task</text>
  <text x="780" y="409" fill="#71717A" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">10:31 AM</text>
  
  <!-- Timeline Node 3 -->
  <circle cx="450" cy="430" r="4" fill="#F97316" />
  <text x="465" y="434" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SLA Timer Started (Water Works Dept)</text>
  <text x="780" y="434" fill="#71717A" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">11:00 AM</text>
</svg>
