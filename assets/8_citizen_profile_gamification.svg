<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#18181B" rx="12" />
  
  <!-- Browser Chrome -->
  <rect width="800" height="40" fill="#09090B" rx="12" />
  <circle cx="20" cy="20" r="6" fill="#EF4444" />
  <circle cx="40" cy="20" r="6" fill="#F59E0B" />
  <circle cx="60" cy="20" r="6" fill="#10B981" />
  <rect x="120" y="8" width="560" height="24" rx="6" fill="#27272A" />
  <text x="400" y="24" fill="#A1A1AA" font-family="monospace" font-size="11" text-anchor="middle">https://civsight-app.run.app/citizen-profile</text>
  
  <!-- Title -->
  <text x="30" y="80" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">🏆 Citizen Standings &amp; Civic Gamification</text>
  <text x="30" y="98" fill="#71717A" font-family="system-ui, sans-serif" font-size="11">Encouraging Proactive Reporting and Duplicate Verifications via Civic XP &amp; Badges</text>
  
  <!-- Left Panel: User Profile Standing Card -->
  <rect x="15" y="115" width="260" height="315" fill="#09090B" rx="8" stroke="#27272A" stroke-width="1.5" />
  
  <!-- Profile Avatar representation -->
  <circle cx="145" cy="175" r="35" fill="#F97316" fill-opacity="0.2" stroke="#F97316" stroke-width="2" />
  <text x="145" y="184" fill="#F97316" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">PK</text>
  
  <!-- User Names -->
  <text x="145" y="235" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Pankaj Kumar</text>
  <text x="145" y="251" fill="#71717A" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Rank: Level 12 Civic Guardian</text>
  
  <!-- XP Progress Bar -->
  <text x="35" y="285" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">EXPERIENCE POINTS (XP)</text>
  <text x="255" y="285" fill="#F97316" font-family="monospace" font-size="11" font-weight="bold" text-anchor="end">3,450 / 4,000 XP</text>
  <rect x="35" y="293" width="220" height="10" rx="5" fill="#27272A" />
  <rect x="35" y="293" width="185" height="10" rx="5" fill="#F97316" /> <!-- 85% progress -->
  
  <!-- Quick Stats -->
  <line x1="35" y1="320" x2="255" y2="320" stroke="#18181B" stroke-width="1.5" />
  
  <g font-family="system-ui, sans-serif" font-size="11" fill="#A1A1AA">
    <text x="35" y="345">🚨 Verified Reports Submitted:</text>
    <text x="255" y="345" fill="#FAFAFA" font-weight="bold" text-anchor="end">24 Issues</text>
    
    <text x="35" y="365">✓ Duplicate Cases Verified:</text>
    <text x="255" y="365" fill="#FAFAFA" font-weight="bold" text-anchor="end">14 Checks</text>
    
    <text x="35" y="385">🌟 Local Ward Rank:</text>
    <text x="255" y="385" fill="#10B981" font-weight="bold" text-anchor="end">#3 in Ward 7</text>
  </g>
  
  <!-- Right Panel: Civic Badges Grid -->
  <rect x="290" y="115" width="495" height="315" fill="#09090B" rx="8" stroke="#27272A" stroke-width="1.5" />
  <text x="310" y="145" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">CIVIC ACHIEVEMENT BADGES</text>
  
  <!-- Bento grid of badges (3 columns x 2 rows) -->
  <!-- Column 1, Row 1: Pothole Patrol (Orange cone) -->
  <rect x="310" y="165" width="145" height="110" rx="8" fill="#18181B" stroke="#27272A" />
  <circle cx="382" cy="205" r="22" fill="#F97316" fill-opacity="0.15" />
  <text x="382" y="213" font-size="20" text-anchor="middle">🚧</text>
  <text x="382" y="245" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Pothole Patrol</text>
  <text x="382" y="260" fill="#71717A" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Reported 5 potholes</text>
  
  <!-- Column 2, Row 1: Water Guardian (Blue droplet) -->
  <rect x="465" y="165" width="145" height="110" rx="8" fill="#18181B" stroke="#27272A" />
  <circle cx="537" cy="205" r="22" fill="#3B82F6" fill-opacity="0.15" />
  <text x="537" y="213" font-size="20" text-anchor="middle">💧</text>
  <text x="537" y="245" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Water Guardian</text>
  <text x="537" y="260" fill="#71717A" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Verified 3 leak fixes</text>
  
  <!-- Column 3, Row 1: Streetlight Watch (Yellow crescent/lamp) -->
  <rect x="620" y="165" width="145" height="110" rx="8" fill="#18181B" stroke="#27272A" />
  <circle cx="692" cy="205" r="22" fill="#EAB308" fill-opacity="0.15" />
  <text x="692" y="213" font-size="20" text-anchor="middle">💡</text>
  <text x="692" y="245" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Night Watcher</text>
  <text x="692" y="260" fill="#71717A" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Flagged 2 lamp outages</text>
  
  <!-- Column 1, Row 2: Community Pillar (Silver building) -->
  <rect x="310" y="295" width="145" height="110" rx="8" fill="#18181B" stroke="#27272A" />
  <circle cx="382" cy="335" r="22" fill="#A1A1AA" fill-opacity="0.15" />
  <text x="382" y="343" font-size="20" text-anchor="middle">🏛️</text>
  <text x="382" y="375" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Community Pillar</text>
  <text x="382" y="390" fill="#71717A" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Received 50 upvotes</text>
  
  <!-- Column 2, Row 2: Duplicate Master (Cyan target scanner) -->
  <rect x="465" y="295" width="145" height="110" rx="8" fill="#18181B" stroke="#27272A" />
  <circle cx="537" cy="335" r="22" fill="#10B981" fill-opacity="0.15" />
  <text x="537" y="343" font-size="20" text-anchor="middle">🎯</text>
  <text x="537" y="375" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Duplicate Sniper</text>
  <text x="537" y="390" fill="#71717A" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Blocked 8 redundant posts</text>
  
  <!-- Column 3, Row 2: Waste Warrior (Green recycling trashcan) -->
  <rect x="620" y="295" width="145" height="110" rx="8" fill="#18181B" stroke="#27272A" />
  <circle cx="692" cy="335" r="22" fill="#10B981" fill-opacity="0.15" />
  <text x="692" y="343" font-size="20" text-anchor="middle">♻️</text>
  <text x="692" y="375" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Waste Warrior</text>
  <text x="692" y="390" fill="#71717A" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Flagged 4 garbage dumps</text>
</svg>
