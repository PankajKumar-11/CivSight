<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#18181B" rx="12" />
  
  <!-- Browser Header -->
  <rect width="800" height="40" fill="#09090B" rx="12" />
  <circle cx="20" cy="20" r="6" fill="#EF4444" />
  <circle cx="40" cy="20" r="6" fill="#F59E0B" />
  <circle cx="60" cy="20" r="6" fill="#10B981" />
  <rect x="120" y="8" width="560" height="24" rx="6" fill="#27272A" />
  <text x="400" y="24" fill="#A1A1AA" font-family="monospace" font-size="11" text-anchor="middle">https://civsight-app.run.app/agent-triage-pipeline</text>
  
  <!-- Main Grid Layout -->
  <!-- Left Panel: 5-Stage Agentic Pipeline -->
  <rect x="15" y="55" width="310" height="380" fill="#09090B" rx="8" stroke="#27272A" stroke-width="1.5" />
  <text x="30" y="85" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">🤖 Agent Triage Pipeline</text>
  <text x="30" y="105" fill="#71717A" font-family="system-ui, sans-serif" font-size="11">Real-Time Autonomous Multi-Agent Coordinator</text>
  
  <!-- Timeline vertical connector line -->
  <line x1="50" y1="140" x2="50" y2="390" stroke="#27272A" stroke-width="3" />
  
  <!-- Stage 1 (Success) -->
  <circle cx="50" cy="140" r="12" fill="#10B981" />
  <path d="M 46 140 L 49 143 L 55 137" stroke="#FAFAFA" stroke-width="2" fill="none" />
  <text x="75" y="140" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Stage 1: Vision Classifier Agent</text>
  <text x="75" y="154" fill="#10B981" font-family="system-ui, sans-serif" font-size="11" font-weight="500">COMPLETE • Category Identified</text>
  
  <!-- Stage 2 (Success) -->
  <circle cx="50" cy="200" r="12" fill="#10B981" />
  <path d="M 46 200 L 49 203 L 55 197" stroke="#FAFAFA" stroke-width="2" fill="none" />
  <text x="75" y="200" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Stage 2: Geo-Context Agent</text>
  <text x="75" y="214" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="11" font-weight="500">De-duplicated within 200m zone</text>
  
  <!-- Stage 3 (Active) -->
  <circle cx="50" cy="260" r="12" fill="#F59E0B" />
  <circle cx="50" cy="260" r="18" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3">
    <animateTransform attributeName="transform" type="rotate" from="0 50 260" to="360 50 260" dur="10s" repeatCount="indefinite" />
  </circle>
  <text x="75" y="260" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Stage 3: Community Validation</text>
  <text x="75" y="274" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="11" font-weight="500">ACTIVE • Pending Local Votes</text>
  
  <!-- Stage 4 (Queued) -->
  <circle cx="50" cy="320" r="12" fill="#27272A" />
  <circle cx="50" cy="320" r="4" fill="#71717A" />
  <text x="75" y="320" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Stage 4: SLA &amp; Router Agent</text>
  <text x="75" y="334" fill="#71717A" font-family="system-ui, sans-serif" font-size="11">QUEUED • Waiting for Stage 3</text>
  
  <!-- Stage 5 (Queued) -->
  <circle cx="50" cy="380" r="12" fill="#27272A" />
  <circle cx="50" cy="380" r="4" fill="#71717A" />
  <text x="75" y="380" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Stage 5: Resolution Tracker</text>
  <text x="75" y="394" fill="#71717A" font-family="system-ui, sans-serif" font-size="11">QUEUED • Side-by-side Vision Audit</text>
  
  <!-- Right Panel: Live Agent Streaming Logs Terminal -->
  <rect x="340" y="55" width="445" height="380" fill="#09090B" rx="8" stroke="#27272A" stroke-width="1.5" />
  <rect x="340" y="55" width="445" height="30" fill="#18181B" rx="8" />
  <text x="355" y="74" fill="#E4E4E7" font-family="monospace" font-size="11" font-weight="bold">terminal - agent_triage_daemon.log</text>
  <circle cx="740" cy="70" r="4" fill="#71717A" />
  <circle cx="755" cy="70" r="4" fill="#71717A" />
  <circle cx="770" cy="70" r="4" fill="#71717A" />
  
  <!-- Text logs -->
  <g font-family="monospace" font-size="11" fill="#D4D4D8">
    <text x="355" y="110" fill="#71717A">[06:44:02] STAGE 1: Vision Classifier starting...</text>
    <text x="355" y="125" fill="#3B82F6">[06:44:03] Gemini 3.5 Flash: Multi-modal payload received.</text>
    <text x="355" y="140" fill="#10B981">[06:44:05] CLASSIFICATION: "Road pothole, size ~1.5m, depth 10cm."</text>
    <text x="355" y="155" fill="#10B981">[06:44:05] SEVERITY SCORING: "Severity: 8/10 (High vehicular hazard)"</text>
    
    <text x="355" y="180" fill="#71717A">[06:44:06] STAGE 2: Spatial Geo-Context checking...</text>
    <text x="355" y="195" fill="#EAB308">[06:44:07] GEOPROXIMITY: Radius check of 200m around (26.915, 75.801)</text>
    <text x="355" y="210" fill="#EF4444">[06:44:08] DUPLICATE CHECK: Active Pothole #8788 detected at 42m.</text>
    <text x="355" y="225" fill="#3B82F6">[06:44:08] SYSTEM RESOLUTION: Merging. User linked as Supporting Witness.</text>
    <text x="355" y="240" fill="#10B981">[06:44:09] SYSTEM AWARD: Credited 250 XP to Citizen User (Level 12)</text>
    
    <text x="355" y="265" fill="#71717A">[06:44:10] STAGE 3: Community Triage validation...</text>
    <text x="355" y="280" fill="#F59E0B">[06:44:11] BROADCAST: Pushed alert to 48 local Ward 7 subscribers.</text>
    <text x="355" y="295" fill="#A1A1AA">[06:44:13] STATE RE-EVALUATION: Current Upvotes: 4/5 required.</text>
    <text x="355" y="310" fill="#F59E0B">[06:44:15] PUSHED: "Awaiting final upvote to dispatch field repair crew..."</text>
    
    <text x="355" y="340" fill="#71717A">---------------------------------------------------------</text>
    <text x="355" y="360" fill="#EF4444" font-weight="bold">[LIVE STREAMING] Listening for local websocket signals...</text>
    
    <!-- Blinking Cursor -->
    <rect x="355" y="375" width="6" height="12" fill="#10B981">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
