<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#18181B" rx="12" />
  
  <!-- Browser Chrome -->
  <rect width="800" height="40" fill="#09090B" rx="12" />
  <circle cx="20" cy="20" r="6" fill="#EF4444" />
  <circle cx="40" cy="20" r="6" fill="#F59E0B" />
  <circle cx="60" cy="20" r="6" fill="#10B981" />
  <rect x="120" y="8" width="560" height="24" rx="6" fill="#27272A" />
  <text x="400" y="24" fill="#A1A1AA" font-family="monospace" font-size="11" text-anchor="middle">https://civsight-app.run.app/admin-insights</text>
  
  <!-- Title -->
  <text x="30" y="80" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">🏛️ Executive City Intelligence Command Console</text>
  <text x="30" y="98" fill="#71717A" font-family="system-ui, sans-serif" font-size="11">Real-Time Municipal Resource Allocation &amp; Decision Logs</text>
  
  <!-- Grid of Metrics (Left Side) -->
  <!-- SLA resolution rate -->
  <rect x="25" y="120" width="170" height="85" rx="8" fill="#09090B" stroke="#27272A" stroke-width="1.5" />
  <text x="40" y="145" fill="#71717A" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SLA RESOLUTION RATE</text>
  <text x="40" y="185" fill="#10B981" font-family="monospace" font-size="28" font-weight="bold">94.2%</text>
  <text x="180" y="180" fill="#10B981" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">▲ 1.4%</text>
  
  <!-- Average Dispatch latency -->
  <rect x="210" y="120" width="170" height="85" rx="8" fill="#09090B" stroke="#27272A" stroke-width="1.5" />
  <text x="225" y="145" fill="#71717A" font-family="system-ui, sans-serif" font-size="11" font-weight="600">AVG DISPATCH DELAY</text>
  <text x="225" y="185" fill="#3B82F6" font-family="monospace" font-size="28" font-weight="bold">12.4m</text>
  <text x="365" y="180" fill="#10B981" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">▼ 4.5m</text>
  
  <!-- Active Incident Alerts -->
  <rect x="25" y="220" width="170" height="85" rx="8" fill="#09090B" stroke="#27272A" stroke-width="1.5" />
  <text x="40" y="245" fill="#71717A" font-family="system-ui, sans-serif" font-size="11" font-weight="600">ACTIVE RED ALERT CLUSTERS</text>
  <text x="40" y="285" fill="#EF4444" font-family="monospace" font-size="28" font-weight="bold">4</text>
  <text x="180" y="280" fill="#EF4444" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">Critical</text>
  
  <!-- Performance Grade Card -->
  <rect x="210" y="220" width="170" height="85" rx="8" fill="#09090B" stroke="#27272A" stroke-width="1.5" />
  <text x="225" y="245" fill="#71717A" font-family="system-ui, sans-serif" font-size="11" font-weight="600">CITY OPERATIONS GRADE</text>
  <text x="225" y="285" fill="#EAB308" font-family="monospace" font-size="28" font-weight="bold">A-</text>
  <text x="365" y="280" fill="#EAB308" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">Excellent</text>
  
  <!-- Live briefing notes section -->
  <rect x="25" y="320" width="355" height="105" rx="8" fill="#09090B" stroke="#27272A" stroke-width="1.5" />
  <text x="40" y="342" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">🎙️ AI EXECUTIVE DAILY BRIEFING (WARD 7)</text>
  <g font-family="system-ui, sans-serif" font-size="10" fill="#A1A1AA">
    <text x="40" y="362">• Water Works Board resolved 3 high-SLA leak complaints in record time today.</text>
    <text x="40" y="378">• Ashok Marg streetlight cluster requires urgent routing dispatcher intervention.</text>
    <text x="40" y="394">• Pothole citizen reports reduced by 14% this week due to preventive paving efforts.</text>
  </g>
  
  <!-- Conversational AI Assistant Panel (Right Side) -->
  <rect x="395" y="120" width="380" height="305" rx="8" fill="#09090B" stroke="#4F46E5" stroke-width="1.5" />
  <rect x="395" y="120" width="380" height="34" rx="8" fill="#1E1B4B" />
  <text x="415" y="142" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">✨ CivSight AI Advisor (Conversational RAG)</text>
  <circle cx="760" cy="137" r="4" fill="#10B981" />
  
  <!-- Chat bubbles -->
  <!-- User query bubble -->
  <rect x="475" y="165" width="290" height="42" rx="6" fill="#18181B" stroke="#27272A" />
  <text x="485" y="181" fill="#71717A" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">COMMISSIONER USER</text>
  <text x="485" y="196" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="11">Which department is currently lagging on SLA deadlines?</text>
  
  <!-- AI Response bubble -->
  <rect x="410" y="217" width="355" height="155" rx="6" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1" />
  <text x="420" y="233" fill="#818CF8" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">CIVSIGHT AI ADVISOR (Gemini 3.5)</text>
  <g font-family="system-ui, sans-serif" font-size="11" fill="#D4D4D8">
    <text x="420" y="252">The "Streetlight Maintenance" crew is currently lagging with</text>
    <text x="420" y="268">an 86.8% SLA rate (the target is &gt;90%). This is due to a</text>
    <text x="420" y="284">4.2% spike in bulb burnouts concentrated along Ashok Marg.</text>
    
    <text x="420" y="308" fill="#FAFAFA" font-weight="600">Recommended Actions:</text>
    <text x="420" y="326">• Reallocate 2 operators from Sanitation (currently at 98% SLA).</text>
    <text x="420" y="342">• Batch work-orders using nearest-neighbor routing optimization.</text>
  </g>
  
  <!-- Faux Textbox input -->
  <rect x="410" y="382" width="355" height="32" rx="6" fill="#18181B" stroke="#27272A" />
  <text x="420" y="401" fill="#52525B" font-family="system-ui, sans-serif" font-size="11">Ask AI Advisor about Ward 7 status...</text>
  <text x="750" y="402" fill="#4F46E5" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">⚡</text>
</svg>
