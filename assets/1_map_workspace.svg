<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#18181B" rx="12" />
  
  <!-- Browser Chrome Header -->
  <rect width="800" height="40" fill="#09090B" rx="12" />
  <circle cx="20" cy="20" r="6" fill="#EF4444" />
  <circle cx="40" cy="20" r="6" fill="#F59E0B" />
  <circle cx="60" cy="20" r="6" fill="#10B981" />
  <rect x="120" y="8" width="560" height="24" rx="6" fill="#27272A" />
  <text x="400" y="24" fill="#A1A1AA" font-family="monospace" font-size="11" text-anchor="middle">https://civsight-app.run.app/map-workspace</text>
  
  <!-- Main Layout Grid -->
  <!-- Left Sidebar (Filters) -->
  <rect x="15" y="55" width="200" height="380" fill="#09090B" rx="8" stroke="#27272A" stroke-width="1.5" />
  
  <!-- Sidebar Headers & Text -->
  <text x="30" y="85" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">🏛️ CivSight Map</text>
  <text x="30" y="105" fill="#71717A" font-family="system-ui, sans-serif" font-size="11">Ward 7 Incident Center</text>
  
  <!-- Search bar -->
  <rect x="25" y="125" width="180" height="30" rx="6" fill="#18181B" stroke="#27272A" />
  <text x="35" y="144" fill="#52525B" font-family="system-ui, sans-serif" font-size="12">Search incidents...</text>
  
  <!-- Filters Checklist -->
  <text x="30" y="185" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="12" font-weight="600">INCIDENT FILTERS</text>
  
  <!-- Checkboxes -->
  <!-- Potholes -->
  <rect x="30" y="202" width="14" height="14" rx="3" fill="#F97316" />
  <text x="52" y="214" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="12">Potholes &amp; Roads</text>
  <!-- Water Leaks -->
  <rect x="30" y="228" width="14" height="14" rx="3" fill="#3B82F6" />
  <text x="52" y="240" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="12">Water Leaks</text>
  <!-- Streetlights -->
  <rect x="30" y="254" width="14" height="14" rx="3" fill="#EAB308" />
  <text x="52" y="266" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="12">Broken Streetlights</text>
  <!-- Sanitation -->
  <rect x="30" y="280" width="14" height="14" rx="3" fill="#10B981" />
  <text x="52" y="292" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="12">Sanitation Issues</text>
  
  <!-- Status Stats -->
  <text x="30" y="340" fill="#A1A1AA" font-family="system-ui, sans-serif" font-size="12" font-weight="600">LIVE WARD SUMMARY</text>
  <text x="30" y="365" fill="#EF4444" font-family="system-ui, sans-serif" font-size="12">● 8 Unassigned Tickets</text>
  <text x="30" y="385" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="12">● 14 Active SLA Repairs</text>
  <text x="30" y="405" fill="#10B981" font-family="system-ui, sans-serif" font-size="12">● 142 Resolved Today</text>
  
  <!-- Map Canvas Panel (Right Panel) -->
  <rect x="230" y="55" width="555" height="380" fill="#111827" rx="8" stroke="#1F2937" stroke-width="1.5" />
  
  <!-- Map Grid Overlay -->
  <path d="M 230 100 L 785 100 M 230 150 L 785 150 M 230 200 L 785 200 M 230 250 L 785 250 M 230 300 L 785 300 M 230 350 L 785 350 M 230 400 L 785 400" stroke="#1F2937" stroke-width="1" />
  <path d="M 300 55 L 300 435 M 370 55 L 370 435 M 440 55 L 440 435 M 510 55 L 510 435 M 580 55 L 580 435 M 650 55 L 650 435 M 720 55 L 720 435" stroke="#1F2937" stroke-width="1" />
  
  <!-- Vector Road Overlays (High-fidelity Map design) -->
  <!-- Main Road (MI Road) -->
  <path d="M 230 200 L 785 220" stroke="#374151" stroke-width="24" stroke-linecap="round" opacity="0.6" />
  <path d="M 230 200 L 785 220" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="10,8" opacity="0.4" />
  <text x="500" y="195" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10" transform="rotate(2, 500, 195)">M.I. ROAD (HIGHWAY 11)</text>
  
  <!-- Secondary Road (Ashok Marg) -->
  <path d="M 450 55 L 490 435" stroke="#374151" stroke-width="18" stroke-linecap="round" opacity="0.6" />
  <text x="495" y="110" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10" transform="rotate(84, 495, 110)">ASHOK MARG</text>
  
  <!-- Loop Road -->
  <path d="M 300 350 Q 550 420 720 320" fill="none" stroke="#374151" stroke-width="16" opacity="0.6" />
  
  <!-- Interactive Map Incident Pins -->
  <!-- Pin 1: Pothole on MI road (Orange) -->
  <circle cx="390" cy="205" r="16" fill="#F97316" fill-opacity="0.2" />
  <circle cx="390" cy="205" r="8" fill="#F97316" />
  <path d="M 390 205 L 390 195" stroke="#FFFFFF" stroke-width="2" />
  <circle cx="390" cy="195" r="2" fill="#FFFFFF" />
  
  <!-- Hover Tooltip for Pin 1 -->
  <rect x="310" y="115" width="160" height="60" rx="6" fill="#09090B" stroke="#F97316" stroke-width="1.5" />
  <text x="320" y="133" fill="#F97316" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">🚨 POTHOLE CLUSTER</text>
  <text x="320" y="148" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SLA: 12 Hours Left</text>
  <text x="320" y="163" fill="#71717A" font-family="system-ui, sans-serif" font-size="10">MI Road - Near Fuel Station</text>
  <path d="M 390 175 L 385 180 L 395 180 Z" fill="#09090B" stroke="#F97316" stroke-width="1.5" />
  <rect x="382" y="174" width="16" height="7" fill="#09090B" /> <!-- mask the overlay stroke -->
  
  <!-- Pin 2: Streetlight failure (Yellow) -->
  <circle cx="480" cy="250" r="12" fill="#EAB308" fill-opacity="0.2" />
  <circle cx="480" cy="250" r="6" fill="#EAB308" />
  
  <!-- Pin 3: Water Leak (Blue) -->
  <circle cx="600" cy="215" r="14" fill="#3B82F6" fill-opacity="0.2" />
  <circle cx="600" cy="215" r="7" fill="#3B82F6" />
  
  <!-- Pin 4: Sanitation (Green) -->
  <circle cx="550" cy="380" r="12" fill="#10B981" fill-opacity="0.2" />
  <circle cx="550" cy="380" r="6" fill="#10B981" />
  
  <!-- Compass/Scale UI Overlay -->
  <rect x="725" y="365" width="50" height="50" rx="6" fill="#09090B" stroke="#27272A" />
  <path d="M 750 375 L 745 395 L 755 395 Z" fill="#EF4444" />
  <path d="M 750 405 L 745 395 L 755 395 Z" fill="#71717A" />
  <text x="750" y="411" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">N</text>
  
  <rect x="245" y="400" width="80" height="18" rx="4" fill="#09090B" stroke="#27272A" />
  <text x="285" y="412" fill="#E4E4E7" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Scale: 1:5,000</text>
</svg>
