<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#18181B" rx="12" />
  
  <!-- Browser Chrome -->
  <rect width="800" height="40" fill="#09090B" rx="12" />
  <circle cx="20" cy="20" r="6" fill="#EF4444" />
  <circle cx="40" cy="20" r="6" fill="#F59E0B" />
  <circle cx="60" cy="20" r="6" fill="#10B981" />
  <rect x="120" y="8" width="560" height="24" rx="6" fill="#27272A" />
  <text x="400" y="24" fill="#A1A1AA" font-family="monospace" font-size="11" text-anchor="middle">https://civsight-app.run.app/predictive-hotspots</text>
  
  <!-- Title -->
  <text x="30" y="80" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">📈 Predictive Hotspot Anomalies &amp; SLA Trends</text>
  <text x="30" y="98" fill="#71717A" font-family="system-ui, sans-serif" font-size="11">Time-Series Trends &amp; Geospacial Heatmap Clustering Models</text>
  
  <!-- Left Panel: SLA Trend Line Charts -->
  <rect x="15" y="115" width="410" height="315" fill="#09090B" rx="8" stroke="#27272A" stroke-width="1.5" />
  <text x="30" y="145" fill="#FAFAFA" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">SLA PERFORMANCE COMPARISON</text>
  <text x="30" y="161" fill="#71717A" font-family="system-ui, sans-serif" font-size="11">Resolved (Green) vs Reported (Purple) tickets over time</text>
  
  <!-- Chart Grid Lines -->
  <path d="M 50 200 L 390 200 M 50 240 L 390 240 M 50 280 L 390 280 M 50 320 L 390 320 M 50 360 L 390 360" stroke="#18181B" stroke-width="1" />
  <line x1="50" y1="365" x2="390" y2="365" stroke="#27272A" stroke-width="2" /> <!-- x axis -->
  <line x1="50" y1="185" x2="50" y2="365" stroke="#27272A" stroke-width="2" /> <!-- y axis -->
  
  <!-- Chart Line 1: Reported (Purple) -->
  <path d="M 50 300 L 100 240 L 150 280 L 200 210 L 250 190 L 300 230 L 350 200 L 390 220" fill="none" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Chart Line 2: Resolved (Green) -->
  <path d="M 50 340 L 100 290 L 150 310 L 200 240 L 250 200 L 300 210 L 350 195 L 390 190" fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 50 340 L 100 290 L 150 310 L 200 240 L 250 200 L 300 210 L 350 195 L 390 190 L 390 365 L 50 365 Z" fill="url(#greenGradient)" opacity="0.1" />
  
  <defs>
    <linearGradient id="greenGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#10B981" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Chart Axis Labels -->
  <g font-family="monospace" font-size="9" fill="#71717A">
    <text x="45" y="203" text-anchor="end">100</text>
    <text x="45" y="243" text-anchor="end">80</text>
    <text x="45" y="283" text-anchor="end">60</text>
    <text x="45" y="323" text-anchor="end">40</text>
    <text x="45" y="363" text-anchor="end">20</text>
    
    <text x="50" y="382" text-anchor="middle">Jan</text>
    <text x="100" y="382" text-anchor="middle">Feb</text>
    <text x="150" y="382" text-anchor="middle">Mar</text>
    <text x="200" y="382" text-anchor="middle">Apr</text>
    <text x="250" y="382" text-anchor="middle">May</text>
    <text x="300" y="382" text-anchor="middle">Jun</text>
    <text x="350" y="382" text-anchor="middle">Jul</text>
    <text x="390" y="382" text-anchor="middle">Aug</text>
  </g>
  
  <!-- Right Panel: Hotspot Map Overlay & AI Alerts -->
  <rect x="440" y="115" width="345" height="315" fill="#111827" rx="8" stroke="#1F2937" stroke-width="1.5" />
  
  <!-- Mini Map visualization -->
  <path d="M 440 180 Q 560 160 785 190 M 440 310 L 785 290 M 580 115 L 610 430" stroke="#374151" stroke-width="8" opacity="0.4" />
  
  <!-- Heatmap glowing red circle -->
  <circle cx="600" cy="210" r="45" fill="#EF4444" fill-opacity="0.3" filter="url(#blur)" />
  <circle cx="600" cy="210" r="25" fill="#EF4444" fill-opacity="0.5" />
  <circle cx="600" cy="210" r="8" fill="#EF4444" />
  
  <!-- Blur Filter definition -->
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>
  
  <!-- Floating Alert Card -->
  <rect x="460" y="270" width="305" height="135" rx="6" fill="#09090B" stroke="#EF4444" stroke-width="1.5" />
  <rect x="460" y="270" width="305" height="28" rx="6" fill="#7F1D1D" />
  <text x="475" y="288" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">⚠️ PREDICTIVE ALERTMASK CLUSTER</text>
  
  <g font-family="system-ui, sans-serif" font-size="11" fill="#FAFAFA">
    <!-- Geohash coordinates info -->
    <text x="475" y="318" font-weight="bold">High Pipe Rupture Probability (92%)</text>
    <text x="475" y="334" fill="#A1A1AA">Sector: Ward 7 MI Road Junction</text>
    <text x="475" y="355" fill="#EF4444" font-weight="600">Symptom: 3 pressure drop complaints in 12h</text>
    
    <!-- CTA button -->
    <rect x="475" y="370" width="275" height="24" rx="4" fill="#EF4444" />
    <text x="612" y="386" fill="#FAFAFA" font-size="10" font-weight="bold" text-anchor="middle">DISPATCH PREVENTIVE MAINTENANCE TEAM</text>
  </g>
</svg>
